<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>opc.so — 一人公司，so what？</title>
  <meta name="description" content="opc.so — One Person Company. 一人公司，so what？">
  <style>
    @font-face {
      font-family: 'GeistPixel';
      src: url('/fonts/GeistPixel-Square.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'GeistPixel', -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      cursor: crosshair;
    }

    canvas { position: fixed; inset: 0; z-index: 0; }

    .scene {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Logo ── */
    .logo {
      font-size: 20vw;
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.06em;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(255,255,255,0.12);
      position: relative;
      opacity: 0;
      animation: smashIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      user-select: none;
    }
    .logo .fill {
      position: absolute;
      inset: 0;
      color: #fff;
      -webkit-text-stroke: 0;
      clip-path: inset(0 100% 0 0);
      animation: reveal 1.2s cubic-bezier(0.65, 0, 0.35, 1) 0.8s forwards;
    }
    .logo .dot {
      -webkit-text-stroke: 0;
      color: #22c55e;
      text-shadow: 0 0 60px rgba(34, 197, 94, 0.6), 0 0 120px rgba(34, 197, 94, 0.3);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes smashIn {
      from { opacity: 0; transform: scale(1.3) translateY(-20px); filter: blur(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
    @keyframes reveal {
      to { clip-path: inset(0 0% 0 0); }
    }
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 60px rgba(34, 197, 94, 0.6), 0 0 120px rgba(34, 197, 94, 0.3); }
      50% { text-shadow: 0 0 80px rgba(34, 197, 94, 0.8), 0 0 160px rgba(34, 197, 94, 0.4); }
    }

    /* ── Manifesto ── */
    .manifesto {
      margin-top: 48px;
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.2;
      text-align: center;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
    }
    .manifesto .so-what {
      display: inline-block;
      background: linear-gradient(135deg, #22c55e 0%, #3b82f6 50%, #a855f7 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ── Sub text ── */
    .sub {
      margin-top: 32px;
      font-size: 15px;
      font-weight: 400;
      color: #444;
      letter-spacing: 0.5px;
      line-height: 2;
      text-align: center;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 2s forwards;
    }

    /* ── Divider line ── */
    .divider {
      width: 40px;
      height: 1px;
      background: #22c55e;
      margin: 40px auto;
      opacity: 0;
      animation: expandIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2.3s forwards;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
    }
    @keyframes expandIn {
      from { opacity: 0; width: 0; }
      to { opacity: 1; width: 40px; }
    }

    /* ── Status ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 2.6s forwards;
    }
    .status .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Scanline ── */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.3), transparent);
      z-index: 20;
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      from { top: -2px; }
      to { top: 100vh; }
    }

    @media (max-width: 480px) {
      .logo { font-size: 28vw; -webkit-text-stroke-width: 1px; }
      .manifesto { margin-top: 32px; }
      .sub { font-size: 13px; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="scanline"></div>

  <div class="scene">
    <div class="logo" aria-label="opc.so">
      opc<span class="dot">.</span>so
      <div class="fill" aria-hidden="true">opc<span class="dot">.</span>so</div>
    </div>

    <div class="manifesto">一人公司，<span class="so-what">so what？</span></div>

    <div class="sub">
      不需要团队。不需要融资。不需要许可。<br>
      一个人。一个想法。就够了。
    </div>

    <div class="divider"></div>

    <div class="status">
      <span class="dot"></span>
      coming soon
    </div>
  </div>

  <script>
    const canvas = document.getElementById("bg")
    const ctx = canvas.getContext("2d")
    let w, h, cols, rows
    const cellSize = 60
    let mouse = { x: -1000, y: -1000 }
    let time = 0

    function resize() {
      w = canvas.width = window.innerWidth
      h = canvas.height = window.innerHeight
      cols = Math.ceil(w / cellSize) + 1
      rows = Math.ceil(h / cellSize) + 1
    }

    function draw() {
      ctx.clearRect(0, 0, w, h)
      time += 0.003

      // Grid dots with mouse interaction
      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          const x = i * cellSize
          const y = j * cellSize

          const dx = mouse.x - x
          const dy = mouse.y - y
          const dist = Math.sqrt(dx * dx + dy * dy)
          const maxDist = 200

          let r = 1
          let alpha = 0.06

          if (dist < maxDist) {
            const force = 1 - dist / maxDist
            r = 1 + force * 3
            alpha = 0.06 + force * 0.5

            // Green glow near cursor
            ctx.beginPath()
            ctx.arc(x, y, r + 4, 0, Math.PI * 2)
            ctx.fillStyle = `rgba(34, 197, 94, ${force * 0.15})`
            ctx.fill()
          }

          // Subtle wave
          const wave = Math.sin(time * 2 + i * 0.3 + j * 0.3) * 0.03
          alpha += wave

          ctx.beginPath()
          ctx.arc(x, y, r, 0, Math.PI * 2)
          ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, alpha)})`
          ctx.fill()
        }
      }

      // Occasional flash lines
      if (Math.random() < 0.005) {
        const y = Math.random() * h
        ctx.beginPath()
        ctx.moveTo(0, y)
        ctx.lineTo(w, y)
        ctx.strokeStyle = `rgba(34, 197, 94, ${Math.random() * 0.06})`
        ctx.lineWidth = 1
        ctx.stroke()
      }

      requestAnimationFrame(draw)
    }

    document.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX
      mouse.y = e.clientY
    })
    document.addEventListener("mouseleave", () => {
      mouse.x = -1000
      mouse.y = -1000
    })

    window.addEventListener("resize", resize)
    resize()
    draw()
  </script>
</body>
</html>
